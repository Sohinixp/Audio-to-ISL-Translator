<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISL Multilingual Avatar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-wrapper">
        <aside id="sidebar">
            <div class="brand">
                <h1>ISL <span class="thin">Translator</span></h1>
                <p class="label">Project Accessibility</p>
            </div>

            <div class="interface-actions">
                <p class="label">Select Language</p>
                <div class="scroll-nav">
                    <select id="lang-select" class="lang-btn">
                        <option value="en-US">English</option>
                        <option value="bn-IN">Bengali</option>
                        <option value="hi-IN">Hindi</option>
                        <option value="mr-IN">Marathi</option>
                        <option value="te-IN">Telugu</option>
                        <option value="ta-IN">Tamil</option>
                        <option value="ml-IN">Malayalam</option>
                    </select>
                </div>

                <button id="start-btn" class="idle">Start Recognition</button>
                <button id="stop-btn" class="secondary-btn">Stop</button>
            </div>
        </aside>

        <main id="workspace">
            <div id="canvas-container"></div>

            <div id="speech-overlay">
                <div class="recognition-box">
                    <p class="box-label">LIVE TRANSCRIPTION</p>
                    <div id="output">Waiting for speech...</div>
                </div>
            </div>

            <div id="avatar-controls">
                <button class="ctrl-btn">Reset Camera</button>
                <div class="ctrl-btn">
                    Speed: 
                    <select id="speed-select">
                        <option value="1">1.0x</option>
                        <option value="0.5">0.5x</option>
                        <option value="1.5">1.5x</option>
                    </select>
                </div>
            </div>
        </main>
    </div>

    <script type="importmap">
        { 
            "imports": { 
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js", 
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" 
            } 
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
